name: ecogasto
description: Aplicación de gestión financiera personal.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Base de datos local
  sqflite: ^2.3.2
  path: ^1.9.0

  # Gráficos (Fase 3)
  fl_chart: ^0.68.0

  # Internacionalización y formato de moneda/fecha
  intl: ^0.20.2

   # Guardar PIN de forma persistente
  shared_preferences: ^2.2.3
  
  # Localization
  flutter_localizations:
    sdk: flutter

  # Exportar PDF (Fase 4)
  pdf: ^3.10.8
  printing: ^5.12.0

  # Íconos adicionales
  cupertino_icons: ^1.0.6

  # Firebase
  cloud_firestore: ^5.2.1
  firebase_auth: ^5.7.0
  firebase_core: ^3.15.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true